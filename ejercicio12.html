<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ejercicio12</title>
</head>
<body>
    <script>
        // Ejercicio 12: Solicitar al usuario que ingrese un número. Usando un if/else mostrar un mensaje indicando si el número es par o impar
        let numIngresado = parseInt(prompt("Ingrese un numero para saber si es par o impar:"));
        if (numIngresado % 2 === 0) {
            alert(`El numero ingresado ${numIngresado} es par`);
        } else {
            alert(`El numero ingresado ${numIngresado} es impar`);
        }
    </script>
</body>
</html>
