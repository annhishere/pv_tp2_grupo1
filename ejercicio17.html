<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 17</title>
</head>
<body>

    <h1>Ejercicio 17</h1>

    <script>
        let texto;

        texto = prompt("Ingrese un texto:");

        const contarLetraA = (t) => {
            let contador = 0;

            for (let i = 0; i < t.length; i++) {
                if (t[i].toLowerCase() === "a") {
                    contador++;
                }
            }
            return contador;
        }

        document.write(`Cantidad de letras "a": ${contarLetraA(texto)}`);
    </script>

</body>
</html>
