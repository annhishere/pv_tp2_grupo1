<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 16</title>
</head>
<body>

    <h1>Ejercicio 16</h1>

    <script>
        let inicio, fin;

        inicio = parseInt(prompt("Ingrese el número inicial:"));
        fin = parseInt(prompt("Ingrese el número final:"));

        const sumarRango = (i, f) => {
            let suma = 0;
            for (let j = i; j <= f; j++) {
                suma += j;
            }
            return suma;
        }

        document.write(`La suma del rango es: ${sumarRango(inicio, fin)}`);
    </script>
    
</body>
</html>
