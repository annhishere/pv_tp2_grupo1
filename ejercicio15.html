<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ejercicio 15</title>
</head>
<body>
    <script>
        function mes(numero){
            switch(numero){
                case 1:
                    return "Enero";
                case 2:
                    return "Febrero";
                case 3:
                    return "Marzo";
                case 4:
                    return "Abril";
                case 5:
                    return "Mayo";
                case 6:
                    return "Junio";
                case 7:
                    return "Julio";
                case 8:
                    return "Agosto";
                case 9:
                    return "Septiembre";
                case 10:
                    return "Octubre";
                case 11:
                    return "Noviembre";
                case 12:
                    return "Diciembre";
                default:
                    return "Número de mes inválido. Por favor ingrese un número entre 1 y 12.";
            }
        }
    let numeroIngresado= parseInt(prompt("ingrese un numero de mes (1 al 12)"))
    let numeroMes= mes(numeroIngresado);
    document.write(`El mes correspondiente al numero ${numeroIngresado} es: ${numeroMes}`);
    </script>
</body>
</html>
